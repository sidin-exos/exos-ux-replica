<svg xmlns="http://www.w3.org/2000/svg"
     width="340" height="120" viewBox="0 0 340 120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- background -->
  <rect width="340" height="120" fill="#FFFFFF"/>

  <!-- ── MARK ── -->
  <g transform="translate(20,10)">
    <polygon points="40,48 66,74 40,100 14,74" fill="#0C1D2E"/>
    <polygon points="40,24 66,50 40,76 14,50" fill="#2CC9C0"/>
    <polygon points="40,0 66,26 40,52 14,26"
             fill="none" stroke="#0C1D2E" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- ── DIVIDER ── -->
  <rect x="116" y="30" width="2" height="60" fill="#0C1D2E" opacity="0.15" rx="1"/>

  <!-- ── WORDMARK ── -->
  <text x="138" y="65"
        font-family="Poppins, sans-serif" font-weight="700"
        font-size="46" letter-spacing="10"
        fill="#0C1D2E" dominant-baseline="middle">EXOS</text>
</svg>