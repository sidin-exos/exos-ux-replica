<svg xmlns="http://www.w3.org/2000/svg"
     width="496" height="200" viewBox="0 0 496 200">
  <!--
    EXOS Logo — Dark variant
    Mark: symmetric 3-layer diamond stack with teal gradient
    Font: Poppins Bold 700 + Light 300 (Google Fonts)
  -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&amp;family=Space+Grotesk:wght@500&amp;display=swap');
    </style>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#47DDD4"/>
      <stop offset="100%" stop-color="#19A49C"/>
    </linearGradient>
  </defs>

  <!-- background (remove rect for transparent export) -->
  <rect width="496" height="200" fill="#080F1A"/>

  <!-- ── MARK ── -->
  <g transform="translate(50,50)">
    <polygon points="40,48 66,74 40,100 14,74" fill="#122F47"/>
    <polygon points="40,24 66,50 40,76 14,50" fill="url(#tg)"/>
    <polygon points="40,0 66,26 40,52 14,26"
             fill="none" stroke="url(#tg)" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- ── DIVIDER ── -->
  <rect x="152" y="70" width="2" height="60" fill="#FFFFFF" opacity="0.15" rx="1"/>

  <!-- ── WORDMARK ── -->
  <text x="174" y="96"
        font-family="Poppins, sans-serif" font-weight="700"
        font-size="42" letter-spacing="9"
        fill="#FFFFFF" dominant-baseline="middle">EXOS</text>

  <!-- ── SUB-LABEL ── -->
  <text x="177" y="128"
        font-family="'Space Grotesk', sans-serif" font-weight="500"
        font-size="12" letter-spacing="4"
        fill="#2CC9C0" opacity="0.85" dominant-baseline="middle">PROCUREMENT INTELLIGENCE</text>
</svg>